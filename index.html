<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
  <body>
    <div id="pageGrid">
      <h1 id="title">Tic Tac Toe</h1>
      <h2 id="title2">Tic Tac Toe</h2>
      <button id="startButton" onclick="startButton()">START</button>
      <div id="menu">
        <p id="nameTag">ENTER NAME</p>
        <input id="player1" type="text" placeholder="player 1 name">
        <input id="player2" type="text" placeholder="player 2 name">
        <p>SELECT DIFFICULTY</p>
        <button class="diffButtons" id="vsFriend" onclick="diffButton('friend')">VS FRIEND</button>
        <button class="diffButtons" id="normalDiff" onclick="diffButton('normal')">NORMAL</button>      </div>
      <div id="chooseTurn">
        <p id="selectShape">SELECT</p>
        <button class="diffButtons" id="turn0" onclick="turnSelect('X', 'O')">X</button>
        <button class="diffButtons" id="turn1" onclick="turnSelect('O', 'X')">O</button>
      </div>
      <div id="displayBoard"></div>
      <div id="scoreBoard"></div>
      <button id="reset" onclick="resetGame()">RESET</button>
      <div id="outcomeScreen"></div>
      <div id="aboutMe">
        Made by <a href="https://github.com/arminggwp">arminggwp</a>
      </div>
    </div>
    <script src="betterScript.js"></script>
  </body>
</html>
